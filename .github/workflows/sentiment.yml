name: Sentiment Data Updater

on:
  schedule:
    - cron: '0 1 * * *'    # daily at 01:00 UTC (F&G updates once per day)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
        with:
          ref: live-model-1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and upsert latest sentiment
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: python -m src.data.sentiment
